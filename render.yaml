services:
  - type: web
    name: svdp-jsp
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: "svdp"
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
